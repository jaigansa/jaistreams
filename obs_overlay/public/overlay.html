<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS Stream Overlay</title>
  
  <!-- Use Tailwind CDN for full utility class access -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Inter Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: transparent !important;
      overflow: hidden;
    }
    
    /* Smooth CSS Animations */
    .fade-transition {
      transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
    }
    
    .fade-out {
      opacity: 0;
      transform: scale(0.97) translateY(2px);
    }
    
    .fade-in {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    /* Pulsing Light */
    .pulse-dot {
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% {
        opacity: 0.4;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }
  </style>
</head>
<body class="bg-transparent select-none">

  <!-- HUD Container (Configured dynamically in JS) -->
  <div id="hud-container" class="fixed bottom-6 right-6 w-80 space-y-4">
    
    <!-- 1. YouTube Stats Card -->
    <div id="stats-card" class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 shadow-sm flex items-center space-x-3 transition-all duration-500">
      <div id="avatar-image" class="w-12 h-12 rounded-full overflow-hidden border border-zinc-700 bg-zinc-800 flex-shrink-0 flex items-center justify-center">
        <!-- Dynamic Avatar -->
      </div>
      <div class="flex-grow min-w-0">
        <div class="flex items-center space-x-2">
          <span class="w-2 h-2 rounded-full bg-emerald-500 pulse-dot flex-shrink-0"></span>
          <h3 id="channel-title" class="text-sm font-bold text-zinc-100 truncate leading-none mb-0.5">Loading Channel...</h3>
        </div>
        <div class="flex items-center space-x-4 mt-1.5 text-[10px] font-semibold uppercase tracking-wider">
          <div class="text-zinc-500">
            <span>Subs: <strong id="subscribers-count" class="text-indigo-400 font-bold ml-0.5">--</strong></span>
          </div>
          <div class="text-zinc-500 border-l border-zinc-700 pl-3">
            <span>Views: <strong id="total-channel-views" class="text-emerald-400 font-bold ml-0.5">--</strong></span>
          </div>
        </div>
      </div>
    </div>

    <!-- 2. Interactive Socials & QR Loop Card -->
    <div id="socials-card" class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 shadow-sm flex flex-col items-center space-y-3 transition-all duration-500">
      <div class="w-full text-center">
        <span class="block text-[8px] font-bold text-zinc-500 uppercase tracking-widest leading-none mb-1">CONNECT WITH ME</span>
        <h4 id="qr-label" class="text-lg font-bold text-indigo-400 tracking-tight leading-none transition-colors duration-500">YouTube</h4>
      </div>
      <div id="qrcode-container" class="w-64 h-64 bg-white border border-zinc-300 rounded-xl overflow-hidden p-2 flex items-center justify-center flex-shrink-0 transition-all duration-500">
        <img id="qrcode" class="fade-transition fade-in max-w-full max-h-full" src="" alt="QR Code">
      </div>
    </div>

    <!-- 3. Active Stream Missions & Progress Card -->
    <div id="mission-card" class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 shadow-sm space-y-3 transition-all duration-500">
      <div class="flex items-center justify-between border-b border-zinc-800 pb-2">
        <div class="flex items-center space-x-2">
          <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 pulse-dot"></span>
          <span class="text-[9px] font-bold text-zinc-400 uppercase tracking-widest">LIVE OBJECTIVE</span>
        </div>
        <span id="game-info" class="text-[10px] font-medium text-zinc-500 leading-none">GTA V</span>
      </div>
      
      <div id="mission-container" class="fade-transition fade-in space-y-3">
        <div>
          <h4 id="mission-title" class="text-base font-bold text-zinc-100 tracking-tight leading-none mb-1.5">No active objective</h4>
          <p id="mission-objective" class="text-[11px] font-medium text-zinc-400 leading-snug">Mission list is currently empty.</p>
        </div>
        
        <!-- Progress Bar -->
        <div class="space-y-1.5 pt-1.5">
          <div class="flex justify-between text-[9px] font-bold text-zinc-500 uppercase tracking-wider">
            <span>Progress</span>
            <span id="mission-progress-text" class="text-indigo-400 font-bold">0/100</span>
          </div>
          <div class="w-full bg-zinc-950 border border-zinc-800 h-2.5 rounded-full overflow-hidden">
            <div id="mission-progress-bar" class="bg-indigo-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
          </div>
        </div>
      </div>
    </div>
    
  </div>

  <script src="./overlay.js"></script>
</body>
</html>
