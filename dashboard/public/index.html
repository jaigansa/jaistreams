<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JaiStreams - Dashboard</title>
  
  <!-- Use Tailwind CDN for full utility class access -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Inter Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    
    /* Smooth Transitions */
    .fade-transition {
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .fade-out {
      opacity: 0;
      transform: scale(0.98);
    }
    .fade-in {
      opacity: 1;
      transform: scale(1);
    }
  </style>

</head>

<body class="bg-zinc-950 text-zinc-100 min-h-screen p-4 md:p-8 flex flex-col items-center">
  
  <!-- Top Navigation (replacing the floating toggle) -->
  <div class="w-full max-w-5xl flex justify-between items-center mb-8">
    <div class="flex items-center space-x-2.5">
      <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
      <h1 class="text-xl font-bold tracking-tight text-white">JaiStreams Dashboard</h1>
    </div>
    
    <!-- Admin Panel Link -->
    <a href="/admin.html" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-xs font-semibold transition duration-200 shadow-sm shadow-indigo-900/30">
      Open Admin Console
    </a>
  </div>

  <div class="w-full max-w-5xl space-y-6">
    
    <!-- Top Row: YouTube Channel Stats -->
    <div id="channel-info" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-6 shadow-sm flex flex-col md:flex-row items-center justify-between text-center md:text-left gap-6">
      
      <!-- Avatar & Title -->
      <div class="flex items-center gap-4">
        <div id="avatar-container" class="w-20 h-20 rounded-full overflow-hidden border-2 border-indigo-500/50 flex-shrink-0 bg-zinc-800 flex items-center justify-center">
           <svg class="w-8 h-8 text-zinc-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </div>
        <div>
          <h2 id="channel-title" class="text-2xl font-bold text-white tracking-tight">Loading...</h2>
          <p class="text-sm text-zinc-400 font-medium">YouTube Channel</p>
        </div>
      </div>

      <!-- Stats Counters -->
      <div class="flex gap-8">
        <div class="flex flex-col items-center md:items-end">
          <span class="text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Subscribers</span>
          <span id="subscriber-count" class="text-3xl font-bold text-indigo-400">--</span>
        </div>
        <div class="flex flex-col items-center md:items-end">
          <span class="text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Total Views</span>
          <span id="view-count" class="text-3xl font-bold text-emerald-400">--</span>
        </div>
        <div class="flex flex-col items-center md:items-end">
          <span class="text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Videos</span>
          <span id="video-count" class="text-3xl font-bold text-rose-400">--</span>
        </div>
      </div>
      
    </div>

    <!-- Middle Row: 3 Columns -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      
      <!-- Social Media QR Code Card -->
      <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-xl shadow-sm md:col-span-1 flex flex-col items-center justify-center space-y-4">
        <div class="w-full flex items-center justify-between border-b border-zinc-800 pb-2 mb-2">
          <h3 class="text-sm font-semibold text-zinc-200">Connect</h3>
          <!-- Social Link Controls inside the card header -->
          <div id="qr-buttons" class="flex items-center space-x-1.5">
            <!-- Populated by app.js -->
          </div>
        </div>
        
        <h2 id="social-label" class="text-xl font-bold text-indigo-400 tracking-tight transition-colors duration-300">Loading...</h2>
        
        <div id="qrcode-container" class="w-40 h-40 bg-white p-2 rounded-xl border border-zinc-700 shadow-inner flex items-center justify-center">
          <img id="qrcode" src="" alt="QR Code" class="max-w-full max-h-full fade-transition fade-in hidden">
        </div>
      </div>
      
      <!-- Stream Setup (Game & Info) -->
      <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-xl shadow-sm md:col-span-2 flex flex-col justify-center space-y-6">
         <div class="flex items-center justify-between border-b border-zinc-800 pb-2">
          <h3 class="text-sm font-semibold text-zinc-200">Active Game Setup</h3>
        </div>
        
        <!-- Render Game logic from app.js -->
        <div id="game-title" class="min-h-[60px] flex items-center justify-center">
           <p class="text-zinc-500 text-sm">Loading active game...</p>
        </div>
        <div id="game-button" class="mt-2"></div>
      </div>

    </div>

    <!-- Bottom Row: Stream Objectives (Missions) -->
    <div class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-6 shadow-sm flex flex-col items-center justify-center min-h-[220px]">
      <div class="w-full flex items-center justify-between border-b border-zinc-800 pb-2 mb-6">
        <h3 class="text-sm font-semibold text-zinc-200">Live Stream Objectives</h3>
        <div id="mission-buttons"></div>
      </div>
      
      <div id="missions" class="w-full max-w-2xl flex-grow flex items-center justify-center fade-transition fade-in">
        <p class="text-zinc-500 text-sm">Loading objectives...</p>
      </div>
    </div>
    
  </div>

  <script src="./app.js"></script>
</body>

</html>
